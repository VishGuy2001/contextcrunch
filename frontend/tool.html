<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ContextCrunch — Tool</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/style.css">
<style>
.tool-page{max-width:1060px;margin:0 auto;padding:2rem 2rem 5rem}
.tool-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:.5rem}
.tool-top h1{font-family:var(--serif);font-size:1.6rem}
.reset-btn{font-family:var(--mono);font-size:.7rem;color:var(--muted);background:none;border:1px solid var(--border);border-radius:6px;padding:.28rem .7rem;cursor:pointer;transition:all .15s}
.reset-btn:hover{border-color:var(--danger);color:var(--danger)}

/* Model selector */
.model-selector{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:1rem 1.1rem;margin-bottom:.85rem}
.model-tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin-bottom:.85rem}
.mtab{border:2px solid var(--border);border-radius:8px;padding:.65rem .85rem;cursor:pointer;background:var(--white);transition:all .15s;text-align:left}
.mtab:hover{border-color:#bbb}
.mtab.active{border-color:var(--black);background:var(--black);color:var(--white)}
.mtab-name{font-family:var(--serif);font-size:.92rem;display:block;margin-bottom:.1rem}
.mtab-note{font-family:var(--mono);font-size:.58rem;opacity:.55}
.mtab.active .mtab-note{opacity:.65}
.version-row{display:flex;align-items:center;gap:.35rem;flex-wrap:wrap;padding-top:.7rem;border-top:1px solid var(--border)}
.version-lbl{font-family:var(--mono);font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
.vbtn{border:1px solid var(--border);border-radius:6px;padding:.25rem .65rem;background:var(--cream);font-family:var(--mono);font-size:.66rem;cursor:pointer;color:var(--black);transition:all .15s;line-height:1.4}
.vbtn:hover{border-color:#aaa}
.vbtn.active{background:var(--black);color:var(--white);border-color:var(--black)}
.vbtn.recommended{border-color:var(--accent)}
.vbtn.recommended.active{background:var(--accent);border-color:var(--accent)}
.tok-note{font-family:var(--mono);font-size:.6rem;color:var(--muted);margin-top:.4rem;display:block}

/* Behavior */
.beh-strip{background:var(--cream);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:.55rem .95rem;margin-bottom:.85rem;display:flex;align-items:baseline;gap:.55rem;flex-wrap:wrap}
.beh-label{font-family:var(--mono);font-size:.58rem;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
.beh-text{font-size:.78rem;color:#444;line-height:1.55}

/* Grid */
.tool-grid{display:grid;grid-template-columns:1fr 244px;gap:1rem;align-items:start;margin-bottom:1rem}

/* Input */
.input-panel{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
.ipanel-top{display:flex;align-items:center;justify-content:space-between;padding:.5rem .9rem;border-bottom:1px solid var(--border);background:var(--cream)}
.ipanel-lbl{font-family:var(--mono);font-size:.62rem;color:var(--muted)}
.tok-live{font-family:var(--mono);font-size:.68rem}
.tok-live .safe{color:var(--accent)}.tok-live .warning{color:var(--warn)}.tok-live .danger{color:var(--danger)}
.main-ta{flex:1;min-height:150px;max-height:220px;border:none;padding:.85rem .95rem;font-family:var(--sans);font-size:.84rem;color:var(--black);background:var(--white);resize:vertical;outline:none;line-height:1.65}
.main-ta::placeholder{color:var(--muted);font-size:.8rem}
.file-drop{border-top:1px dashed var(--border);padding:.5rem .95rem;text-align:center;cursor:pointer;font-size:.7rem;color:var(--muted);font-family:var(--mono);background:var(--cream);transition:all .2s}
.file-drop:hover,.file-drop.has-file{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.ipanel-btm{display:flex;align-items:center;justify-content:space-between;padding:.45rem .9rem;border-top:1px solid var(--border);background:var(--cream);flex-wrap:wrap;gap:.35rem}
.file-status{font-size:.62rem;font-family:var(--mono);color:var(--muted)}

/* Gauges */
.gauges-panel{display:flex;flex-direction:column;gap:.45rem}
.g-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:.65rem .8rem}
.g-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.25rem}
.g-lbl{font-family:var(--mono);font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.g-val{font-family:var(--serif);font-size:1.1rem}
.g-val.safe{color:var(--accent)}.g-val.warning{color:var(--warn)}.g-val.danger{color:var(--danger)}
.g-track{background:var(--mid);border-radius:3px;height:4px;overflow:hidden;margin:.25rem 0}
.g-fill{height:100%;border-radius:3px;transition:width .5s ease}
.g-fill.safe{background:var(--accent)}.g-fill.warning{background:var(--warn)}.g-fill.danger{background:var(--danger)}
.g-sub{font-size:.6rem;color:var(--muted);font-family:var(--mono);line-height:1.4}
.g-table{width:100%;font-size:.68rem;border-collapse:collapse}
.g-table td{padding:.18rem 0}
.g-table td:last-child{text-align:right;font-family:var(--mono)}
.lat-bg{background:var(--mid);border-radius:3px;height:4px;margin:.25rem 0;overflow:hidden}
.lat-bar{height:100%;border-radius:3px;transition:width .6s ease}
.mwarn{background:#fdf5e8;border:1px solid #f0c090;border-radius:7px;padding:.5rem .65rem;display:flex;gap:.4rem}
.mwarn-dot{width:13px;height:13px;border-radius:50%;background:var(--warn);color:white;font-size:.52rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}

/* Loading */
.tool-loading{display:none;text-align:center;padding:1.1rem;font-family:var(--mono);font-size:.78rem;color:var(--muted)}
.tool-loading.on{display:block}

/* Output */
.out-box{background:var(--white);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:10px;overflow:hidden;margin-bottom:.9rem}
.out-head{display:flex;align-items:center;justify-content:space-between;padding:.55rem .95rem;border-bottom:1px solid var(--border);background:var(--cream);font-size:.7rem;font-family:var(--mono);color:var(--muted);flex-wrap:wrap;gap:.35rem}
.out-badge{background:var(--accent-light);color:var(--accent);font-size:.6rem;padding:.12rem .45rem;border-radius:100px;font-family:var(--mono)}
.copy-btn{background:var(--black);color:var(--white);border:none;padding:.22rem .6rem;border-radius:5px;font-size:.66rem;cursor:pointer;font-family:var(--mono);transition:background .15s}
.copy-btn:hover{background:var(--accent)}
.out-body{padding:.9rem 1rem;font-size:.8rem;line-height:1.75;color:#333;white-space:pre-wrap;max-height:220px;overflow-y:auto}
.out-foot{padding:.4rem .95rem;font-size:.6rem;color:var(--muted);font-family:var(--mono);border-top:1px solid var(--border);background:var(--cream)}

/* Math */
.math-box{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:.9rem}
.math-head{display:flex;align-items:flex-start;justify-content:space-between;padding:.8rem 1.1rem;border-bottom:1px solid var(--border);background:var(--cream);flex-wrap:wrap;gap:.5rem}
.math-head-title{font-family:var(--serif);font-size:.95rem}
.math-body{padding:.9rem 1rem}
.math-card{background:var(--cream);border:1px solid var(--border);border-radius:8px;padding:.85rem .95rem;margin-bottom:.6rem}
.math-card:last-child{margin-bottom:0}
.math-card h4{font-family:var(--serif);font-size:.88rem;margin-bottom:.28rem}
.math-card p{font-size:.76rem;color:#444;line-height:1.68;margin-bottom:.3rem}
.math-card p:last-child{margin-bottom:0}
.learn-link{font-size:.66rem;color:var(--accent);font-family:var(--mono)}

@media(max-width:760px){.tool-grid{grid-template-columns:1fr}.model-tabs{grid-template-columns:1fr}}
@media(max-width:480px){.tool-page{padding:1.1rem 1rem 4rem}}
</style>
</head>
<body>
<div id="nav-root"></div>
<main>
<div class="tool-page">

  <div class="tool-top">
    <div>
      <span class="section-label">The tool</span>
      <h1>Crunch your context</h1>
    </div>
    <button class="reset-btn" id="reset-btn">↺ Reset</button>
  </div>

  <!-- Model selector -->
  <div class="model-selector">
    <div class="model-tabs" id="model-tabs">
      <button class="mtab active" data-model="claude">
        <span class="mtab-name">Claude</span>
        <span class="mtab-note">Anthropic · full recall</span>
      </button>
      <button class="mtab" data-model="chatgpt">
        <span class="mtab-name">ChatGPT</span>
        <span class="mtab-note">OpenAI · silent truncation</span>
      </button>
      <button class="mtab" data-model="gemini">
        <span class="mtab-name">Gemini</span>
        <span class="mtab-note">Google · largest window</span>
      </button>
    </div>
    <div class="version-row">
      <span class="version-lbl">Version</span>
      <div id="plan-btns" style="display:flex;gap:.3rem;flex-wrap:wrap"></div>
    </div>
    <span class="tok-note" id="tokenizer-note"></span>
  </div>

  <!-- Behavior strip -->
  <div class="beh-strip" id="beh-note">
    <span class="beh-label" id="beh-tag"></span>
    <span class="beh-text" id="beh-text"></span>
  </div>

  <!-- Main grid -->
  <div class="tool-grid">
    <div class="input-panel">
      <div class="ipanel-top">
        <span class="ipanel-lbl">Paste conversation or upload file</span>
        <span class="tok-live" id="token-live">0 tokens</span>
      </div>
      <textarea class="main-ta" id="main-ta"
        placeholder="Paste any conversation from Claude, ChatGPT, or Gemini.&#10;&#10;Works best with speaker labels:&#10;Human: your message&#10;Assistant: AI response"></textarea>
      <label class="file-drop" id="file-zone" for="file-input">
        Drop a file or click &nbsp;·&nbsp;
        <span style="font-family:var(--mono);font-size:.66rem">PDF &nbsp;·&nbsp; PPTX &nbsp;·&nbsp; DOCX &nbsp;·&nbsp; TXT</span>
      </label>
      <input type="file" id="file-input" style="display:none" accept=".txt,.md,.csv,.pdf,.docx,.doc,.pptx,.ppt">
      <div class="ipanel-btm">
        <span class="file-status" id="file-status">PDF · PPTX · DOCX · plain text</span>
        <div style="display:flex;gap:.3rem">
          <button class="btn btn-secondary" id="analyze-btn" style="font-size:.73rem;padding:.35rem .8rem" disabled>Analyze</button>
          <button class="btn btn-primary"   id="compress-btn" style="font-size:.73rem;padding:.35rem .8rem" disabled>Compress →</button>
        </div>
      </div>
    </div>
    <div class="gauges-panel" id="gauges-pane"></div>
  </div>

  <div class="tool-loading" id="loading"><span id="loading-msg">Analyzing</span>...</div>

  <div id="output-section" style="display:none">
    <div class="out-box">
      <div class="out-head">
        <span>Compressed — ready to paste</span>
        <div style="display:flex;align-items:center;gap:.45rem">
          <span class="out-badge" id="saved-badge"></span>
          <button class="copy-btn" id="copy-btn">Copy →</button>
        </div>
      </div>
      <div class="out-body" id="out-text"></div>
      <div class="out-foot" id="out-note"></div>
    </div>
  </div>

  <div class="math-box" id="math-section" style="display:none">
    <div class="math-head">
      <div>
        <div class="section-label" style="margin-bottom:.15rem">Behind your result</div>
        <div class="math-head-title">What the numbers mean</div>
      </div>
      <div class="level-toggle">
        <button class="level-btn active" data-level="simple">Simple</button>
        <button class="level-btn" data-level="technical">Technical</button>
      </div>
    </div>
    <div class="math-body" id="math-area"></div>
  </div>

</div>
</main>
<div id="footer-root"></div>
<script src="shared/nav.js"></script>
<script src="shared/footer.js"></script>
<script src="js/api.js"></script>
<script src="js/tool.js"></script>
</body>
</html>
