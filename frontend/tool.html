<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ContextCrunch — Tool</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/style.css">

<style>
:root{
  --shadow-soft: 0 6px 18px rgba(0,0,0,0.05);
  --shadow-hover: 0 12px 30px rgba(0,0,0,0.08);
  --radius-lg: 14px;
}

*{transition:all .15s ease}

/* Layout */
.tool-wrap{max-width:1100px;margin:0 auto;padding:2rem 2rem 5rem}

/* Header */
.tool-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem}
.reset-btn{
  border:1px solid var(--border);
  border-radius:8px;
  padding:.4rem .9rem;
  font-size:.75rem;
  background:white;
  cursor:pointer;
}
.reset-btn:hover{border-color:var(--danger);color:var(--danger)}

/* Model selector */
.model-selector{
  background:white;
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:1.4rem;
  margin-bottom:1.2rem;
  box-shadow:var(--shadow-soft);
}
.model-selector-row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:.9rem;
}
.model-card{
  border:1px solid var(--border);
  border-radius:12px;
  padding:1rem;
  cursor:pointer;
  background:linear-gradient(180deg,#fff,#fafafa);
}
.model-card:hover{
  transform:translateY(-2px);
  box-shadow:var(--shadow-hover);
}
.model-card.active{
  background:linear-gradient(135deg,#111,#333);
  color:white;
}
.model-card-name{font-family:var(--serif);font-size:1rem}
.model-card-note{font-family:var(--mono);font-size:.7rem;opacity:.6}

/* Behavior */
.beh-note{
  background:white;
  border-left:4px solid var(--accent);
  border-radius:10px;
  padding:.9rem 1.1rem;
  margin-bottom:1.3rem;
  box-shadow:var(--shadow-soft);
}

/* Grid */
.tool-grid{
  display:grid;
  grid-template-columns:1fr 270px;
  gap:1.2rem;
}
@media(max-width:768px){
  .tool-grid{grid-template-columns:1fr}
}

/* Input */
.input-pane{
  background:white;
  border-radius:var(--radius-lg);
  border:1px solid var(--border);
  box-shadow:var(--shadow-soft);
  display:flex;
  flex-direction:column;
}
.pane-hdr{
  padding:.8rem 1rem;
  border-bottom:1px solid var(--border);
  font-family:var(--mono);
  font-size:.75rem;
}
.main-ta{
  border:none;
  padding:1rem;
  min-height:180px;
  font-size:.9rem;
  line-height:1.7;
  outline:none;
}
.file-zone{
  border-top:1px dashed var(--border);
  padding:.8rem;
  text-align:center;
  background:#fafafa;
  cursor:pointer;
}
.file-zone:hover{background:#f0f0f0}
.input-footer{
  display:flex;
  justify-content:space-between;
  padding:.6rem 1rem;
  border-top:1px solid var(--border);
  background:#fafafa;
}
.btn{
  border:none;
  border-radius:8px;
  padding:.45rem .9rem;
  font-size:.8rem;
  cursor:pointer;
}
.btn-primary{
  background:linear-gradient(135deg,#111,#333);
  color:white;
}
.btn-primary:hover{transform:translateY(-1px)}
.btn-secondary{background:#eee}

/* Gauges */
.gauges-pane{display:flex;flex-direction:column;gap:.7rem}
.gauge-card{
  background:white;
  border:1px solid var(--border);
  border-radius:10px;
  padding:.9rem;
  box-shadow:var(--shadow-soft);
}
.gauge-val{
  font-size:1.2rem;
  font-family:var(--serif);
}

/* Output */
.out-box{
  margin-top:1.4rem;
  border-radius:var(--radius-lg);
  overflow:hidden;
  border:1px solid var(--border);
  box-shadow:var(--shadow-soft);
}
.out-hdr{
  padding:.8rem 1rem;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
}
.out-text{
  padding:1rem;
  font-size:.85rem;
  line-height:1.7;
}

/* Mobile */
@media(max-width:600px){
  .model-selector-row{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div id="nav-root"></div>

<main>
<div class="tool-wrap">

  <div class="tool-header">
    <div>
      <span class="section-label">The tool</span>
      <h1 class="section-title">Crunch your context</h1>
    </div>
    <button class="reset-btn" id="reset-btn">Reset</button>
  </div>

  <!-- MODEL SELECTOR -->
  <div class="model-selector">
    <div class="model-selector-row" id="model-cards">
      <div class="model-card active" data-model="claude">
        <span class="model-card-name">Claude</span>
        <span class="model-card-note">Full context focus</span>
      </div>
      <div class="model-card" data-model="chatgpt">
        <span class="model-card-name">ChatGPT</span>
        <span class="model-card-note">Adaptive context</span>
      </div>
      <div class="model-card" data-model="gemini">
        <span class="model-card-name">Gemini</span>
        <span class="model-card-note">Hybrid retrieval</span>
      </div>
    </div>
  </div>

  <!-- Behavior -->
  <div class="beh-note" id="beh-note">
    Claude tends to re-read larger portions of context. Inefficient prompts will fill memory faster.
  </div>

  <!-- GRID -->
  <div class="tool-grid">

    <div class="input-pane">
      <div class="pane-hdr">
        Paste conversation
        <span id="token-live">0 tokens</span>
      </div>

      <textarea class="main-ta" id="main-ta"
      placeholder="Paste conversation here..."></textarea>

      <label class="file-zone" for="file-input">
        Drop file or click · PDF · DOCX · TXT
      </label>

      <input type="file" id="file-input" style="display:none">

      <div class="input-footer">
        <button class="btn btn-secondary" id="analyze-btn" disabled>Analyze</button>
        <button class="btn btn-primary" id="compress-btn" disabled>Compress →</button>
      </div>
    </div>

    <div class="gauges-pane" id="gauges-pane">
      <div class="gauge-card">
        <div class="gauge-val">0%</div>
        <div>Memory Used</div>
      </div>
      <div class="gauge-card">
        <div class="gauge-val">$0</div>
        <div>Cost Estimate</div>
      </div>
      <div class="gauge-card">
        <div class="gauge-val">Low</div>
        <div>Token Waste</div>
      </div>
    </div>

  </div>

  <!-- OUTPUT -->
  <div id="output-section">
    <div class="out-box">
      <div class="out-hdr">
        <span>Compressed Output</span>
        <button class="btn btn-primary" id="copy-btn">Copy</button>
      </div>
      <div class="out-text" id="out-text"></div>
    </div>
  </div>

</div>
</main>

<div id="footer-root"></div>

<script src="shared/nav.js"></script>
<script src="shared/footer.js"></script>
<script src="js/api.js"></script>
<script src="js/tool.js"></script>

</body>
</html>
